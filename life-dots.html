<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Life in Dots – 80 years, one dot per day. Alexander Koenig">
    <title>Life in Dots – Alexander Koenig</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .life-dots-page .content { padding: 20px; max-width: 100%; }
        .life-dots-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0 20px;
            border-bottom: 1px solid var(--border-color, #000);
            margin-bottom: 20px;
        }
        .life-dots-bar label { font-weight: 400; }
        .life-dots-bar input[type="date"] {
            font-family: inherit;
            font-size: 1rem;
            padding: 6px 10px;
            border: 1px solid var(--border-color, #000);
            background: #fff;
        }
        #life-dots-grid {
            display: grid;
            gap: 1px;
            margin: 0 auto;
            width: 100%;
            min-height: 50vh;
            height: calc(100vh - var(--header-height, 60px) - 120px);
            max-height: 75vh;
            justify-content: center;
            align-content: center;
        }
        #life-dots-grid .dot {
            width: 100%;
            height: 100%;
            min-width: 2px;
            min-height: 2px;
            border-radius: 0;
            background: #000;
        }
        #life-dots-grid .dot.future {
            background: #fff;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body class="has-header-border life-dots-page">
    <div class="home-dot">
        <a href="index.html"><div class="dot"></div></a>
    </div>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <a href="index.html" class="header-name">akoenig</a>
                <div class="header-nav">
                    <a href="art.html">Art</a>
                    <a href="research.html">Research</a>
                    <a href="about.html">About</a>
                </div>
            </div>
            <div class="content">
                <div class="life-dots-bar">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday" aria-label="Your date of birth" />
                </div>
                <div id="life-dots-grid" role="img" aria-label="Grid of days in an 80-year life. Lived days in black, future days in white."></div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            var TOTAL_DAYS = 80 * 365.25; // ~29220
            var gridEl = document.getElementById('life-dots-grid');
            var birthdayInput = document.getElementById('birthday');

            function dateToYMD(d) {
                var y = d.getFullYear();
                var m = String(d.getMonth() + 1).padStart(2, '0');
                var day = String(d.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + day;
            }

            function defaultBirthday() {
                var d = new Date();
                d.setFullYear(d.getFullYear() - 30);
                return dateToYMD(d);
            }

            function parseBirthday(value) {
                if (!value) return null;
                var parts = value.split('-').map(Number);
                if (parts.length !== 3) return null;
                var d = new Date(parts[0], parts[1] - 1, parts[2]);
                return isNaN(d.getTime()) ? null : d;
            }

            function buildGrid(birthDate) {
                if (!birthDate || !gridEl) return;
                var start = new Date(birthDate.getFullYear(), birthDate.getMonth(), birthDate.getDate());
                var end = new Date(start);
                end.setFullYear(end.getFullYear() + 80);
                var today = new Date();
                today.setHours(0, 0, 0, 0);

                var dots = [];
                var d = new Date(start);
                while (d < end && dots.length < Math.ceil(TOTAL_DAYS)) {
                    var isLived = d <= today;
                    dots.push(isLived ? 'lived' : 'future');
                    d.setDate(d.getDate() + 1);
                }

                var n = dots.length;
                var container = gridEl.parentElement;
                var w = container ? container.clientWidth : window.innerWidth;
                var h = (gridEl.clientHeight > 0 ? gridEl.clientHeight : window.innerHeight * 0.6) || 400;
                var ratio = w / h;
                var cols = Math.max(1, Math.round(Math.sqrt(n * ratio)));
                var rows = Math.ceil(n / cols);
                var cellW = w / cols;
                var cellH = h / rows;
                var size = Math.max(1, Math.min(cellW, cellH));

                gridEl.style.gridTemplateColumns = 'repeat(' + cols + ', ' + size + 'px)';
                gridEl.style.gridTemplateRows = 'repeat(' + rows + ', ' + size + 'px)';
                gridEl.style.width = (cols * size) + 'px';
                gridEl.style.height = (rows * size) + 'px';

                gridEl.innerHTML = '';
                dots.forEach(function(state) {
                    var span = document.createElement('span');
                    span.className = 'dot' + (state === 'future' ? ' future' : '');
                    span.setAttribute('aria-hidden', 'true');
                    gridEl.appendChild(span);
                });
            }

            function update() {
                var value = birthdayInput.value || defaultBirthday();
                if (!birthdayInput.value) birthdayInput.value = value;
                var b = parseBirthday(value);
                if (b) buildGrid(b);
            }

            birthdayInput.value = defaultBirthday();
            birthdayInput.addEventListener('change', update);
            birthdayInput.addEventListener('input', update);

            window.addEventListener('resize', update);
            update();
            setTimeout(update, 100);
        })();
    </script>
</body>
</html>
